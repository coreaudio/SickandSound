<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Einkaufsliste – Sick & Sound</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    .shopping-list { display: flex; flex-direction: column; gap: 6px; }

    .shopping-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: #1c2130;
      border-radius: 14px;
      border: 1px solid #2a3042;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .shopping-item:active { transform: scale(0.98); }
    .shopping-item.checked {
      opacity: 0.4;
      background: #151a23;
      transform: scale(0.98);
    }
    .shopping-item.checked .item-name { text-decoration: line-through; }
    .shopping-item.removing {
      animation: slideOut 0.4s ease forwards;
    }
    @keyframes slideOut {
      0%   { opacity: 1; transform: translateX(0);    max-height: 80px; }
      100% { opacity: 0; transform: translateX(100%); max-height: 0; padding: 0; margin: 0; border: none; }
    }

    .shopping-item.manual {
      background: linear-gradient(135deg, rgba(110, 231, 255, 0.1), rgba(167, 139, 250, 0.1));
      border-color: rgba(110, 231, 255, 0.3);
    }
    .shopping-item.manual .item-source { color: #6ee7ff; }

    .item-checkbox {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 3px solid #4a5568;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .shopping-item.checked .item-checkbox {
      background: linear-gradient(135deg, #7CFC9A, #6ee7ff);
      border-color: transparent;
    }
    .item-checkbox svg { width: 16px; height: 16px; opacity: 0; color: #0b0e14; transition: opacity 0.2s; }
    .shopping-item.checked .item-checkbox svg { opacity: 1; }

    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 800; font-size: 16px; margin-bottom: 2px; }
    .item-meta { font-size: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .item-amount { opacity: 0.6; }

    /* Hinzufügen */
    .add-section { display: flex; gap: 10px; margin-bottom: 12px; }
    .add-input {
      flex: 1; padding: 14px 16px;
      border-radius: 14px; border: 2px solid #2a3042;
      background: #0e1422; color: #e6e8ef; font-size: 15px; font-weight: 600;
    }
    .add-input:focus { border-color: #6ee7ff; outline: none; }
    .add-input::placeholder { color: #4a5568; font-weight: 400; }
    .add-btn {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, #6ee7ff, #a78bfa);
      color: #0b0e14; font-size: 24px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; flex-shrink: 0;
    }
    .add-btn:active { transform: scale(0.95); }

    /* Statistik */
    .stats-bar { display: flex; gap: 12px; margin-bottom: 12px; }
    .stat-pill {
      flex: 1; padding: 12px 16px;
      background: #1c2130; border-radius: 12px; text-align: center;
    }
    .stat-pill.highlight {
      background: linear-gradient(135deg, rgba(255,107,107,0.2), rgba(255,159,67,0.15));
    }
    .stat-number { font-size: 24px; font-weight: 800; }
    .stat-pill.highlight .stat-number { color: #ff6b6b; }
    .stat-text { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6; }

    /* Leerer Zustand */
    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-icon { font-size: 56px; margin-bottom: 12px; }
    .empty-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; opacity: 0.6; max-width: 260px; margin: 0 auto; }

    /* Quick-Actions */
    .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .quick-btn {
      padding: 10px 16px; border-radius: 10px;
      border: 1px solid #2a3042; background: #1c2130; color: #e6e8ef;
      font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .quick-btn:active { transform: scale(0.97); }
    .quick-btn.danger { border-color: rgba(255,107,107,0.4); color: #ff6b6b; }

    /* Sync-Info */
    .sync-info { font-size: 11px; opacity: 0.5; text-align: center; padding: 8px; }
    .sync-dot {
      display: inline-block; width: 6px; height: 6px;
      background: #7CFC9A; border-radius: 50%; margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Page Split Layout ─────────────────────────────────────────── */
    .page-split {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .list-column { min-width: 0; }

    @media (min-width: 768px) {
      .page-split {
        flex-direction: row;
        align-items: flex-start;
      }
      .list-column { flex: 1; }
      .standard-panel {
        width: 260px;
        flex-shrink: 0;
        position: sticky;
        top: 0;
      }
    }

    /* ── Standard-Artikel Panel ────────────────────────────────────── */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .panel-hint {
      font-size: 11px;
      color: var(--muted);
      margin: 0 0 12px;
    }
    .std-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(110, 231, 255, 0.08);
      border: 1px solid rgba(110, 231, 255, 0.2);
      border-radius: 10px;
      margin-bottom: 6px;
      cursor: grab;
      user-select: none;
      font-size: 14px;
      font-weight: 700;
      transition: background 0.15s, border-color 0.15s;
    }
    .std-chip:active { background: rgba(110, 231, 255, 0.18); cursor: grabbing; }
    .std-chip.dragging { opacity: 0.45; }
    .std-remove {
      background: none; border: none;
      color: #64748b; font-size: 18px; line-height: 1;
      cursor: pointer; padding: 0 2px; min-height: unset;
      flex-shrink: 0;
    }
    .std-remove:hover { color: #ff6b6b; }
    .std-empty-hint {
      font-size: 12px; color: var(--muted);
      text-align: center; padding: 20px 0;
    }

    /* ── Drop-Zone ──────────────────────────────────────────────────── */
    .list-card {
      padding: 16px;
      transition: border-color 0.15s, background 0.15s;
    }
    .list-card.drag-over {
      border-color: rgba(110, 231, 255, 0.55) !important;
      background: linear-gradient(180deg, rgba(110,231,255,0.05), rgba(20,25,38,1)) !important;
    }

    /* ── Touch-Drag Ghost ───────────────────────────────────────────── */
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 500;
      opacity: 0.85;
      border-color: rgba(110, 231, 255, 0.8) !important;
      background: rgba(110, 231, 255, 0.25) !important;
    }
  </style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <div class="app-title">
      <div class="brand-dot"></div>
      <h1>Einkaufsliste</h1>
    </div>
    <div class="appbar-actions">
      <button class="btn small dark" id="panelToggleBtn" onclick="toggleStandardPanel()" title="Standard-Artikel ein-/ausblenden">⭐</button>
      <button class="btn small dark" onclick="refreshList()" title="Aktualisieren">🔄</button>
    </div>
  </header>

  <main class="content">
    <div class="page-split">

      <!-- Linke Spalte: Einkaufsliste -->
      <div class="list-column">
        <!-- Statistik -->
        <div class="stats-bar">
          <div class="stat-pill highlight">
            <div class="stat-number" id="openCount">0</div>
            <div class="stat-text">Offen</div>
          </div>
          <div class="stat-pill">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-text">Gesamt</div>
          </div>
        </div>

        <!-- Hinzufügen -->
        <div class="add-section">
          <input type="text" class="add-input" id="newItem"
                 placeholder="Artikel hinzufügen..."
                 onkeypress="if(event.key==='Enter')addManualItem()">
          <button class="add-btn" onclick="addManualItem()">+</button>
        </div>

        <!-- Drop-Zone: Einkaufsliste -->
        <div class="card list-card" id="listCard"
             ondragover="onDragOver(event)"
             ondragleave="onDragLeave(event)"
             ondrop="handleDrop(event)">
          <div class="shopping-list" id="shoppingList">
            <div class="empty-state">
              <div class="empty-icon">🛒</div>
              <div class="empty-title">Alles erledigt!</div>
              <div class="empty-sub">Keine Artikel. Füge welche hinzu oder ziehe einen Standard-Artikel rüber.</div>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
          <button class="quick-btn danger" onclick="clearChecked()">✓ Erledigte entfernen</button>
        </div>

        <div class="sync-info">
          <span class="sync-dot"></span>
          Automatische Synchronisierung aktiv
        </div>
      </div>

      <!-- Rechte Spalte: Standard-Artikel Panel -->
      <div class="standard-panel card" id="standardPanel">
        <div class="panel-header">
          <span class="section-title" style="margin:0;font-size:15px">Standard-Artikel</span>
          <button class="btn small dark" onclick="openAddStdModal()" title="Artikel hinzufügen">+</button>
        </div>
        <p class="panel-hint">Tippen oder auf Liste ziehen</p>
        <div id="stdList"></div>
      </div>

    </div>
  </main>

  <nav class="bottomnav" id="bottomNav"></nav>
</div>

<!-- Qty Modal -->
<div class="modal" id="qtyModal">
  <div class="box">
    <p id="qtyModalTitle" style="font-weight:800;font-size:17px;margin:0 0 12px">Artikel hinzufügen</p>
    <label class="sub" style="display:block;margin-bottom:6px;font-size:12px">Stückzahl / Menge</label>
    <input type="text" id="qtyInput" placeholder="z. B. 2 oder 1 kg" value="1"
           onkeypress="if(event.key==='Enter')confirmDrop()">
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn" style="flex:1" onclick="confirmDrop()">Hinzufügen</button>
      <button class="btn dark" style="flex:1" onclick="closeModal('qtyModal')">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Add Standard-Artikel Modal -->
<div class="modal" id="addStdModal">
  <div class="box">
    <p style="font-weight:800;font-size:17px;margin:0 0 12px">Standard-Artikel hinzufügen</p>
    <input type="text" id="stdNameInput" placeholder="z. B. Milch, Bier, Toilettenpapier"
           onkeypress="if(event.key==='Enter')confirmAddStd()">
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn" style="flex:1" onclick="confirmAddStd()">Hinzufügen</button>
      <button class="btn dark" style="flex:1" onclick="closeModal('addStdModal')">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" style="
  position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);
  background:#1c2130;border:1px solid #2a3042;padding:10px 18px;
  border-radius:12px;font-size:13px;font-weight:700;
  opacity:0;transition:opacity .25s;pointer-events:none;z-index:200;white-space:nowrap
"></div>
<style>#toast.show { opacity: 1; }</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
  renderBottomNav('einkaufsliste');

  // ── Daten ──────────────────────────────────────────────────────────────────
  let manualItems = [];
  let checkedItems = new Set();

  const STD_KEY = 'sick_sound_standard_artikel';
  let standardArtikel = JSON.parse(localStorage.getItem(STD_KEY) || '[]');

  // ── Standard-Artikel Panel ──────────────────────────────────────────────────
  let panelVisible = window.innerWidth >= 768;

  function applyPanelVisibility() {
    const panel = document.getElementById('standardPanel');
    const btn   = document.getElementById('panelToggleBtn');
    panel.style.display = panelVisible ? '' : 'none';
    btn.style.opacity   = panelVisible ? '1' : '0.5';
  }

  function toggleStandardPanel() {
    panelVisible = !panelVisible;
    applyPanelVisibility();
  }

  function renderStandardArtikel() {
    const list = document.getElementById('stdList');
    if (!standardArtikel.length) {
      list.innerHTML = '<p class="std-empty-hint">Noch keine Artikel.<br>Tippe auf + um welche anzulegen.</p>';
      return;
    }
    list.innerHTML = standardArtikel.map((a, i) =>
      `<div class="std-chip" draggable="true" data-name="${a.name.replace(/"/g,'&quot;')}" data-index="${i}">
        <span>${a.name}</span>
        <button class="std-remove" data-index="${i}" title="Entfernen">×</button>
      </div>`
    ).join('');

    // Drag (mouse) + Click
    list.querySelectorAll('.std-chip').forEach(chip => {
      chip.addEventListener('dragstart', e => {
        pendingDropName = chip.dataset.name;
        e.dataTransfer.setData('text/plain', chip.dataset.name);
        e.dataTransfer.effectAllowed = 'copy';
        chip.classList.add('dragging');
        setTimeout(() => chip.classList.remove('dragging'), 0);
      });
      chip.addEventListener('click', e => {
        if (e.target.classList.contains('std-remove')) return;
        openQtyModal(chip.dataset.name);
      });
    });

    // Remove buttons
    list.querySelectorAll('.std-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        removeStdArtikel(parseInt(btn.dataset.index));
      });
    });

    setupTouchDrag();
  }

  function openAddStdModal() {
    document.getElementById('stdNameInput').value = '';
    openModal('addStdModal');
    setTimeout(() => document.getElementById('stdNameInput').focus(), 350);
  }

  function confirmAddStd() {
    const name = document.getElementById('stdNameInput').value.trim();
    if (!name) return;
    standardArtikel.push({ name, id: Date.now() });
    localStorage.setItem(STD_KEY, JSON.stringify(standardArtikel));
    renderStandardArtikel();
    closeModal('addStdModal');
    showToast(`„${name}" zu Standard-Artikeln hinzugefügt`);
  }

  function removeStdArtikel(index) {
    const name = standardArtikel[index]?.name;
    standardArtikel.splice(index, 1);
    localStorage.setItem(STD_KEY, JSON.stringify(standardArtikel));
    renderStandardArtikel();
    if (name) showToast(`„${name}" entfernt`);
  }

  // ── Drag & Drop (mouse / HTML5) ─────────────────────────────────────────────
  let pendingDropName = '';

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    document.getElementById('listCard').classList.add('drag-over');
  }
  function onDragLeave(e) {
    if (!document.getElementById('listCard').contains(e.relatedTarget)) {
      document.getElementById('listCard').classList.remove('drag-over');
    }
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('listCard').classList.remove('drag-over');
    const name = e.dataTransfer.getData('text/plain') || pendingDropName;
    if (!name) return;
    pendingDropName = name;
    openQtyModal(name);
  }

  // ── Touch-Drag (iPad) ───────────────────────────────────────────────────────
  let touchDrag = null;

  function setupTouchDrag() {
    document.getElementById('stdList').querySelectorAll('.std-chip').forEach(chip => {
      chip.addEventListener('touchstart', onChipTouchStart, { passive: true });
    });
  }

  function onChipTouchStart(e) {
    const chip = e.currentTarget;
    const t    = e.touches[0];
    touchDrag  = { name: chip.dataset.name, chip, startX: t.clientX, startY: t.clientY, ghost: null, moved: false };
    document.addEventListener('touchmove', onChipTouchMove, { passive: false });
    document.addEventListener('touchend',  onChipTouchEnd,  { passive: true  });
  }

  function onChipTouchMove(e) {
    if (!touchDrag) return;
    const t  = e.touches[0];
    const dx = t.clientX - touchDrag.startX;
    const dy = t.clientY - touchDrag.startY;

    if (!touchDrag.moved && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
      touchDrag.moved = true;
      const r     = touchDrag.chip.getBoundingClientRect();
      const ghost = touchDrag.chip.cloneNode(true);
      ghost.className = 'std-chip drag-ghost';
      ghost.style.width  = r.width + 'px';
      ghost.style.left   = (t.clientX - r.width / 2) + 'px';
      ghost.style.top    = (t.clientY - 28) + 'px';
      document.body.appendChild(ghost);
      touchDrag.ghost = ghost;
    }

    if (!touchDrag.ghost) return;
    e.preventDefault();
    touchDrag.ghost.style.left = (t.clientX - touchDrag.ghost.offsetWidth / 2) + 'px';
    touchDrag.ghost.style.top  = (t.clientY - 28) + 'px';

    const rect = document.getElementById('listCard').getBoundingClientRect();
    const over = t.clientX >= rect.left && t.clientX <= rect.right &&
                 t.clientY >= rect.top  && t.clientY <= rect.bottom;
    document.getElementById('listCard').classList.toggle('drag-over', over);
  }

  function onChipTouchEnd(e) {
    if (!touchDrag) return;
    const t = e.changedTouches[0];
    if (touchDrag.ghost) touchDrag.ghost.remove();
    document.getElementById('listCard').classList.remove('drag-over');

    if (!touchDrag.moved) {
      // Tap → sofort Modal öffnen
      openQtyModal(touchDrag.name);
    } else {
      const rect = document.getElementById('listCard').getBoundingClientRect();
      const over = t.clientX >= rect.left && t.clientX <= rect.right &&
                   t.clientY >= rect.top  && t.clientY <= rect.bottom;
      if (over) openQtyModal(touchDrag.name);
    }

    touchDrag = null;
    document.removeEventListener('touchmove', onChipTouchMove);
    document.removeEventListener('touchend',  onChipTouchEnd);
  }

  // ── Qty Modal ───────────────────────────────────────────────────────────────
  function openQtyModal(name) {
    pendingDropName = name;
    document.getElementById('qtyModalTitle').textContent = `„${name}" hinzufügen`;
    document.getElementById('qtyInput').value = '1';
    openModal('qtyModal');
    setTimeout(() => {
      const inp = document.getElementById('qtyInput');
      inp.focus(); inp.select();
    }, 350);
  }

  async function confirmDrop() {
    const qty  = document.getElementById('qtyInput').value.trim() || '1';
    const name = pendingDropName;
    closeModal('qtyModal');
    if (!name) return;
    if (!db) return alert('Offline – kann nicht speichern');

    await db.collection('einkaufsliste').add({
      name,
      amount: qty !== '1' ? qty : '',
      createdAt: Date.now()
    });
    showToast(`${name} hinzugefügt`);
    pendingDropName = '';
  }

  // ── Laden der manuellen Items ───────────────────────────────────────────────
  function loadManualItems() {
    if (!db) return;
    db.collection('einkaufsliste').onSnapshot(snap => {
      manualItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      manualItems.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      renderList();
    });
  }

  // ── Liste rendern ───────────────────────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('shoppingList');
    const open = manualItems.filter(i => !checkedItems.has('manual_' + i.id)).length;
    document.getElementById('openCount').textContent  = open;
    document.getElementById('totalCount').textContent = manualItems.length;

    if (!manualItems.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🛒</div>
          <div class="empty-title">Alles erledigt!</div>
          <div class="empty-sub">Tippe auf einen Standard-Artikel oder gib etwas oben ein.</div>
        </div>`;
      return;
    }

    list.innerHTML = manualItems.map(item => {
      const itemId    = 'manual_' + item.id;
      const isChecked = checkedItems.has(itemId);
      return `
        <div class="shopping-item manual ${isChecked ? 'checked' : ''}"
             data-id="${itemId}"
             onclick="toggleItem('${itemId}')">
          <div class="item-checkbox">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M9 16.2l-3.5-3.5-1.4 1.4L9 19 20.3 7.7l-1.4-1.4z"/>
            </svg>
          </div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            ${item.amount ? `<div class="item-meta"><span class="item-amount">${item.amount}</span></div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── Item abhaken / entfernen ────────────────────────────────────────────────
  function toggleItem(itemId) {
    if (checkedItems.has(itemId)) {
      removeItem(itemId);
    } else {
      checkedItems.add(itemId);
      const el = document.querySelector(`[data-id="${itemId}"]`);
      if (el) {
        el.classList.add('checked');
        setTimeout(() => removeItem(itemId), 600);
      }
    }
    const open = manualItems.filter(i => !checkedItems.has('manual_' + i.id)).length;
    document.getElementById('openCount').textContent = open;
  }

  async function removeItem(itemId) {
    const el = document.querySelector(`[data-id="${itemId}"]`);
    if (el) el.classList.add('removing');

    if (itemId.startsWith('manual_')) {
      const manualId = itemId.replace('manual_', '');
      if (db) await db.collection('einkaufsliste').doc(manualId).delete();
    }

    checkedItems.delete(itemId);
    setTimeout(() => renderList(), 400);
  }

  // ── Manuelles Item hinzufügen ───────────────────────────────────────────────
  async function addManualItem() {
    const input = document.getElementById('newItem');
    const name  = input.value.trim();
    if (!name) return;
    if (!db) return alert('Offline – kann nicht speichern');
    await db.collection('einkaufsliste').add({ name, createdAt: Date.now() });
    input.value = '';
    input.focus();
  }

  // ── Alle erledigten entfernen ───────────────────────────────────────────────
  function clearChecked() {
    checkedItems.forEach(id => removeItem(id));
    checkedItems.clear();
  }

  // ── Liste manuell aktualisieren ─────────────────────────────────────────────
  function refreshList() {
    checkedItems.clear();
    renderList();
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  renderStandardArtikel();
  applyPanelVisibility();
  loadManualItems();

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) refreshList();
  });

  // ── Swipe links → löschen (iOS-Stil) ───────────────────────────────────────
  (function setupSwipe() {
    const list = document.getElementById('shoppingList');
    let sw = { el: null, id: null, startX: 0, startY: 0 };

    list.addEventListener('touchstart', e => {
      const item = e.target.closest('.shopping-item');
      if (!item) return;
      sw = { el: item, id: item.dataset.id, startX: e.touches[0].clientX, startY: e.touches[0].clientY };
    }, { passive: true });

    list.addEventListener('touchmove', e => {
      if (!sw.el) return;
      const dx = e.touches[0].clientX - sw.startX;
      const dy = e.touches[0].clientY - sw.startY;
      if (Math.abs(dy) > Math.abs(dx) + 5) { sw.el = null; return; }
      if (Math.abs(dx) > 6) e.preventDefault();
      const x = Math.max(-90, Math.min(0, dx));
      sw.el.style.transition = 'none';
      sw.el.style.transform  = `translateX(${x}px)`;
      sw.el.style.background = x < -40
        ? `linear-gradient(90deg,#1c2130,rgba(255,75,75,${Math.min(1,Math.abs(x+40)/50)*0.6}))`
        : '';
    }, { passive: false });

    list.addEventListener('touchend', e => {
      if (!sw.el) return;
      const dx = e.changedTouches[0].clientX - sw.startX;
      sw.el.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
      if (Math.abs(dx) > 10) e.preventDefault();
      if (dx < -70) {
        sw.el.style.transform = 'translateX(-110%)';
        sw.el.style.opacity   = '0';
        const id = sw.id;
        setTimeout(() => removeItem(id), 220);
      } else {
        sw.el.style.transform  = '';
        sw.el.style.background = '';
      }
      sw = { el: null, id: null, startX: 0, startY: 0 };
    }, { passive: false });
  })();
</script>
</body>
</html>
